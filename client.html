<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI MMORPG</title>

  <style>
    body { font-family: Arial; }
    canvas { border: 1px solid black; }
    .row { display: flex; gap: 16px; align-items: flex-start; }
    .panel { width: 260px; border: 1px solid #ddd; padding: 10px; }
    .kv { display: flex; justify-content: space-between; margin: 6px 0; font-size: 13px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin: 6px 0; }
    button { padding: 8px; width: 100%; margin: 6px 0; }
    .small { font-size: 12px; color: #666; }
  </style>
</head>

<body>

<h2>AI MMORPG WORLD</h2>

<div class="row">
  <div>
    <button onclick="spawnPlayer()">Spawn Player</button>
    <canvas id="world" width="600" height="600"></canvas>
    <p id="stats" class="small"></p>
  </div>

  <div class="panel">
    <h3 style="margin: 6px 0;">Minimap</h3>
    <canvas id="minimap" width="160" height="160"></canvas>
    <div class="small">Rosso = tu. Arancione = market. Giallo = roads.</div>

    <hr>
    <h3 style="margin: 6px 0;">Player</h3>
    <div class="kv"><span>ID</span><span id="pid">-</span></div>
    <div class="kv"><span>Pos</span><span id="pos">-</span></div>
    <div class="kv"><span>Hunger</span><span id="hunger">-</span></div>

    <hr>
    <h3 style="margin: 6px 0;">Inventory</h3>
    <div class="kv"><span>food</span><span id="inv_food">0</span></div>
    <div class="kv"><span>wood</span><span id="inv_wood">0</span></div>
    <div class="kv"><span>stone</span><span id="inv_stone">0</span></div>

    <hr>
    <h3 style="margin: 6px 0;">Command</h3>
    <input id="commandBox" placeholder="e.g. build house / gather food">
    <button onclick="sendCommand()">Send</button>
    <div class="small">Planner rule-based (poi OpenClaw).</div>
  </div>
</div>

<script>
  const canvas = document.getElementById("world");
  const ctx = canvas.getContext("2d");

  const mini = document.getElementById("minimap");
  const mctx = mini.getContext("2d");

  let playerId = null;

  async function spawnPlayer() {
    const response = await fetch("/spawn_player", { method: "POST" });
    const data = await response.json();
    playerId = data.player_id;
    document.getElementById("pid").innerText = playerId.slice(0, 8) + "...";
  }

  async function sendCommand() {
    if (!playerId) return;
    const text = document.getElementById("commandBox").value.trim();
    if (!text) return;

    await fetch(`/player/${playerId}/command`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text, horizon: "short" })
    });

    document.getElementById("commandBox").value = "";
  }

  function tileColor(t) {
    if (t === "G") return "#7CFC90";
    if (t === "F") return "#2E8B57";
    if (t === "M") return "#999999";
    if (t === "W") return "#4DA6FF";
    return "#ffffff";
  }

  function overlayColor(o) {
    if (o === "R") return "#F2D14B"; // road (giallo)
    if (o === "H") return "#8B5A2B"; // house
    if (o === "K") return "#FF9F1A"; // market
    return null;
  }

  function buildOverlayMap(overlayList) {
    // key "x,y" => t
    const m = new Map();
    overlayList.forEach(o => {
      m.set(`${o.x},${o.y}`, o.t);
    });
    return m;
  }

  function drawMinimap(tilesRows, overlayMap, worldW, worldH, playerX, playerY) {
    const mw = mini.width;
    const mh = mini.height;

    const sx = worldW / mw;
    const sy = worldH / mh;

    const img = mctx.createImageData(mw, mh);
    const data = img.data;

    for (let y = 0; y < mh; y++) {
      const wy = Math.min(worldH - 1, Math.floor(y * sy));
      const row = tilesRows[wy];
      for (let x = 0; x < mw; x++) {
        const wx = Math.min(worldW - 1, Math.floor(x * sx));
        const t = row[wx];

        let r=255, g=255, b=255;
        if (t === "G") { r=124; g=252; b=144; }
        else if (t === "F") { r=46; g=139; b=87; }
        else if (t === "M") { r=153; g=153; b=153; }
        else if (t === "W") { r=77; g=166; b=255; }

        // overlay “dominante” sulla minimap (campionamento semplice)
        const ov = overlayMap.get(`${wx},${wy}`);
        if (ov === "R") { r=242; g=209; b=75; }
        else if (ov === "H") { r=139; g=90; b=43; }
        else if (ov === "K") { r=255; g=159; b=26; }

        const i = (y * mw + x) * 4;
        data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
      }
    }

    mctx.putImageData(img, 0, 0);

    if (playerX != null && playerY != null) {
      const px = Math.floor(playerX / worldW * mw);
      const py = Math.floor(playerY / worldH * mh);
      mctx.fillStyle = "red";
      mctx.fillRect(px - 1, py - 1, 3, 3);
    }
  }

  async function update() {
    const response = await fetch("/state", { cache: "no-store" });
    const data = await response.json();

    const overlayMap = buildOverlayMap(data.overlay);

    const cellSize = 20;
    const viewWidth = Math.floor(canvas.width / cellSize);
    const viewHeight = Math.floor(canvas.height / cellSize);

    // camera segue il TUO player
    let cameraX = 0;
    let cameraY = 0;

    let pdata = null;
    if (playerId) {
      const pr = await fetch(`/player/${playerId}`, { cache: "no-store" });
      if (pr.status === 200) {
        pdata = await pr.json();
        cameraX = pdata.x - Math.floor(viewWidth / 2);
        cameraY = pdata.y - Math.floor(viewHeight / 2);
      }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // base tiles
    for (let y = 0; y < viewHeight; y++) {
      for (let x = 0; x < viewWidth; x++) {
        const wx = x + cameraX;
        const wy = y + cameraY;
        if (wx < 0 || wy < 0 || wx >= data.width || wy >= data.height) continue;

        const tile = data.tiles[wy][wx];
        ctx.fillStyle = tileColor(tile);
        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);

        // overlay sopra
        const ov = overlayMap.get(`${wx},${wy}`);
        if (ov) {
          const c = overlayColor(ov);
          if (c) {
            ctx.fillStyle = c;
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }
      }
    }

    // risorse (sopra overlay)
    ctx.fillStyle = "green";
    data.food.forEach(f => {
      const sx = (f.x - cameraX) * cellSize;
      const sy = (f.y - cameraY) * cellSize;
      ctx.fillRect(sx, sy, cellSize, cellSize);
    });

    ctx.fillStyle = "brown";
    data.wood.forEach(w => {
      const sx = (w.x - cameraX) * cellSize;
      const sy = (w.y - cameraY) * cellSize;
      ctx.fillRect(sx, sy, cellSize, cellSize);
    });

    ctx.fillStyle = "gray";
    data.stone.forEach(s => {
      const sx = (s.x - cameraX) * cellSize;
      const sy = (s.y - cameraY) * cellSize;
      ctx.fillRect(sx, sy, cellSize, cellSize);
    });

    // agenti
    data.agents.forEach(a => {
      const sx = (a.x - cameraX) * cellSize;
      const sy = (a.y - cameraY) * cellSize;

      if (a.role === "merchant") ctx.fillStyle = "#FFD700"; // merchant gold
      else if (a.is_player) ctx.fillStyle = (a.player_id === playerId) ? "red" : "#ff8a8a";
      else ctx.fillStyle = "blue";

      ctx.fillRect(sx, sy, cellSize, cellSize);
    });

    document.getElementById("stats").innerText =
      `Tick: ${data.tick} | Agents: ${data.agents_alive} | Villages: ${countMarkets(data.overlay)}`;

    // HUD + minimap
    if (pdata) {
      document.getElementById("pos").innerText = `(${pdata.x}, ${pdata.y})`;
      document.getElementById("hunger").innerText = `${pdata.hunger}`;
      document.getElementById("inv_food").innerText = pdata.inventory.food ?? 0;
      document.getElementById("inv_wood").innerText = pdata.inventory.wood ?? 0;
      document.getElementById("inv_stone").innerText = pdata.inventory.stone ?? 0;

      drawMinimap(data.tiles, overlayMap, data.width, data.height, pdata.x, pdata.y);
    } else {
      drawMinimap(data.tiles, overlayMap, data.width, data.height, null, null);
    }
  }

  function countMarkets(overlayList) {
    let c = 0;
    overlayList.forEach(o => { if (o.t === "K") c++; });
    return c;
  }

  setInterval(update, 250);
</script>

</body>
</html>
